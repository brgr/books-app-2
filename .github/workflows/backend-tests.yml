name: Backend Checks

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: books-backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync --dev

      - name: Run Ruff
        run: uv run ruff check

  typecheck:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: books-backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync --dev

      - name: Run Ty
        run: uv run ty check

  test:
    runs-on: ubuntu-latest
    needs:
      - lint
      - typecheck
    defaults:
      run:
        working-directory: books-backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync --dev

      - name: Run Ruff
        run: uv run ruff check

      - name: Run Ty
        run: uv run ty check

      - name: Run tests
        run: uv run pytest
